export default "<div class=\"container-fluid bodytag\">\n    <div class=\"row\">\n        <div class=\"col-md-12\">\n            <div class=\"login-form\">\n    \n                <form [formGroup]=\"loginForm\" (ngSubmit)=\"onLoginSubmit()\" method=\"post\">\n                    <h2 class=\"text-center\">LOGIN</h2>       \n                    <div class=\"form-group\">\n                        <input type=\"text\" class=\"form-control\" placeholder=\"Email-ID\" required formControlName=\"email\">\n                        <div *ngIf=\"email.invalid && (email.dirty || email.touched)\" class=\"alert alert-danger\">\n\n                            <div *ngIf=\"email.errors.required\">\n                               Email id is required.\n                            </div>\n                        </div>\n                    </div>\n                    <div class=\"form-group\">\n                        <input type=\"password\" class=\"form-control\" placeholder=\"Password\" required formControlName=\"password\">\n                        <div *ngIf=\"password.invalid && (password.dirty || password.touched)\" class=\"alert alert-danger\">\n\n                            <div *ngIf=\"password.errors.required\">\n                               Password id is required.\n                            </div>\n                        </div>\n                    </div>\n                    <div class=\"form-group text-danger\" *ngIf=\"isnotvalid\">*Invalid Username or Password</div>\n                    <div class=\"form-group\">\n                        <button type=\"submit\" class=\"btn btn-warning btn-block loginButton\" [disabled]=\"!loginForm.valid\"> Log in</button>\n                    </div>\n                    <div class=\"form-group\">\n                        <button type=\"submit\" class=\"btn btn-warning btn-block loginButton\" (click)=\"onRegister()\">Create A New Account</button>\n                    </div>\n\n                </form>\n            </div>\n        </div>\n    </div>\n</div>\n"
